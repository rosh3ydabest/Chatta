<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple WebRTC Video Call</title>
<style>
body{
  font-family: Arial, sans-serif;
  background:#111;
  color:white;
  text-align:center;
  margin:0;
  padding:20px;
}
video{
  background:black;
  border-radius:10px;
  margin:10px;
}
#videos{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
}
button{
  padding:10px 20px;
  margin:10px;
  font-size:16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
textarea{
  width:80%;
  height:120px;
  margin-top:15px;
}
</style>
</head>

<body>

<h1>WebRTC Video Call Test</h1>

<div id="videos">
  <div>
    <h3>Your Camera</h3>
    <video id="localVideo" autoplay playsinline muted width="320" height="240"></video>
  </div>

  <div>
    <h3>Remote Camera</h3>
    <video id="remoteVideo" autoplay playsinline width="320" height="240"></video>
  </div>
</div>

<div>
  <button onclick="startCamera()">Start Camera</button>
  <button onclick="createCall()">Create Call</button>
  <button onclick="answerCall()">Answer Call</button>
</div>

<textarea id="signalData" placeholder="Copy / paste signal data between users here"></textarea>

<script>
let localStream;
let peerConnection;

const servers = {
  iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
};

async function startCamera(){
  localStream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: true
  });

  document.getElementById("localVideo").srcObject = localStream;
}

function createPeer(){
  peerConnection = new RTCPeerConnection(servers);

  localStream.getTracks().forEach(track=>{
    peerConnection.addTrack(track, localStream);
  });

  peerConnection.ontrack = event=>{
    document.getElementById("remoteVideo").srcObject = event.streams[0];
  };

  peerConnection.onicecandidate = event=>{
    if(!event.candidate){
      document.getElementById("signalData").value =
        JSON.stringify(peerConnection.localDescription);
    }
  };
}

async function createCall(){
  createPeer();

  const offer = await peerConnection.createOffer();
  await peerConnection.setLocalDescription(offer);
}

async function answerCall(){
  const data = JSON.parse(document.getElementById("signalData").value);

  createPeer();

  await peerConnection.setRemoteDescription(data);

  const answer = await peerConnection.createAnswer();
  await peerConnection.setLocalDescription(answer);
}
</script>

</body>
</html>
